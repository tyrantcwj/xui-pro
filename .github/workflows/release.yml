name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build web assets
        working-directory: web
        run: |
          npm install
          npm run build

      - name: Build binaries
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist/package
          go build -trimpath -ldflags "-s -w" -o dist/package/xuid ./cmd/xuid
          go build -trimpath -ldflags "-s -w" -o dist/package/xui-agent ./cmd/xui-agent
          cp scripts/xui-pro.sh dist/package/xui-pro
          chmod +x dist/package/xuid dist/package/xui-agent dist/package/xui-pro
          cp -R reality dist/package/reality
          cp README.md dist/package/README.md
          tar -C dist/package -czf "dist/xui-pro-linux-${{ matrix.goarch }}.tar.gz" .

      - uses: actions/upload-artifact@v4
        with:
          name: xui-pro-linux-${{ matrix.goarch }}
          path: dist/xui-pro-linux-${{ matrix.goarch }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          generate_release_notes: true
